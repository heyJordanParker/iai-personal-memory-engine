name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: build & test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Correctness gate
        run: pytest -m "not perf and not slow and not live"
      - name: Build wheel
        run: pip wheel . --no-deps -w dist

  gitleaks:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Linux support is code-complete but not yet validated end-to-end.
  # This job exercises the Linux build + tests without blocking the pipeline;
  # once it is reliably green it can be promoted to a required check.
  test-linux:
    name: build & test (Linux, experimental)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: System build deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Install with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Correctness gate
        run: pytest -m "not perf and not slow and not live"

  # Advisory until the existing lint backlog is cleared; does not block.
  lint:
    name: ruff (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install "ruff>=0.5"
      - run: ruff check .
